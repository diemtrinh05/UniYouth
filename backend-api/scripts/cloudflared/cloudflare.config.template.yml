tunnel: <TUNNEL_UUID>
credentials-file: <CLOUDFLARED_CREDENTIALS_FILE>

ingress:
  - hostname: api.<DOMAIN>
    service: https://localhost:7016
    originRequest:
      noTLSVerify: true

  - hostname: admin.<DOMAIN>
    service: https://localhost:7091
    originRequest:
      noTLSVerify: true

  - hostname: face.<DOMAIN>
    service: http://127.0.0.1:8001

  - service: http_status:404
